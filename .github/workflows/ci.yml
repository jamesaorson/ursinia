name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install - guile
        run: |
          sudo apt-get install -y \
            guile-3.0

      - name: Render
        run: |
          make render

      - name: Check Check for uncommitted changes
        if: github.event_name != 'workflow_dispatch'
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Error: Uncommitted changes found. Please commit the rendered files."
            git status
            exit 1
          fi
