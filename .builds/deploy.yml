image: alpine/latest
sources:
  - git@git.sr.ht:~jamesaorson/ursinia
environment:
  REPO: ursinia
secrets:
  # NOTE: SSH Key - ursinia - remote-deploy
  - e69e1aea-5fd3-4dcc-8360-6c34942d26d1
tasks:
  - ssh-config: |-
      touch ~/.ssh/config
      cat <<EOF >> ~/.ssh/config
      Host ursinia.net
        User james
        IdentityFile ~/.ssh/e69e1aea-5fd3-4dcc-8360-6c34942d26d1
      EOF
  - ssh-keyscan: |-
      touch ~/.ssh/known_hosts
      ssh-keyscan ursinia.net >> ~/.ssh/known_hosts
  - remote-deploy: |-
      cd ${REPO}
      make remote-deploy
