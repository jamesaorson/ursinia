image: alpine/edge
oauth: git.sr.ht/REPOSITORY pages.sr.ht/PAGES:RW
packages:
- hut
sources:
  - git@git.sr.ht:~jamesaorson/ursinia
environment:
  REPO: ursinia
  DOMAIN: ursinia.net
secrets:
  # NOTE: builds-ssh-key
  - 829b570c-d1ea-4e37-b46c-9229ba50ee63
tasks:
- build: |
    cd ${REPO}/src
    subdomains=$(ls)
    # NOTE: Scripts assume start in repo root
    for subdomain in ${subdomains}; do
      cd ${subdomain}
      sh ./build.sh ${subdomain}
      cd ..
    done
- compress: |
    cd ${REPO}/wwwroot
    subdomains=$(ls)
    # NOTE: Scripts assume start in repo root
    for subdomain in ${subdomains}; do
      cd ${subdomain}
      sh ./compress.sh ${subdomain}
      cd ..
    done
- release: |
    cd ${REPO}/wwwroot
    subdomains=$(ls)
    cd ..
    # NOTE: Scripts assume start in repo root
    for subdomain in ${subdomains}; do
      cd ${subdomain}
      sh ./release.sh ${subdomain}
      cd ..
    done

