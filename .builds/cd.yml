image: alpine/edge
oauth: git.sr.ht/REPOSITORY pages.sr.ht/PAGES:RW
packages:
- hut
sources:
  - git@git.sr.ht:~jamesaorson/ursinia
environment:
  REPO: ursinia
  DOMAIN: ursinia.net
secrets:
  # NOTE: builds-ssh-key
  - 829b570c-d1ea-4e37-b46c-9229ba50ee63
tasks:
- package: |
    cd ${REPO}/src
    for subdomain in $(ls); do
      ../scripts/build.sh $subdomain
      cd ../wwwroot
      ../scripts/compress.sh $subdomain
      cd ../src
    done
- publish: |
    cd ${REPO}/wwwroot
    for subdomain in $(ls); do
      ../scripts/release.sh $subdomain
    done

