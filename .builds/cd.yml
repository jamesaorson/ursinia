image: alpine/edge
oauth: git.sr.ht/REPOSITORY pages.sr.ht/PAGES:RW
packages:
- hut
sources:
  - git@git.sr.ht:~jamesaorson/ursinia
environment:
  REPO: ursinia
  DOMAIN: ursinia.net
secrets:
  # NOTE: builds-ssh-key
  - 829b570c-d1ea-4e37-b46c-9229ba50ee63
tasks:
- package: |
    cd ${REPO}/src
    subdomains=$(ls)
    cd ..
    for subdomain in ${subdomains}; do
      sh ./scripts/build.sh $subdomain
      sh ./scripts/compress.sh $subdomain
    done
- publish: |
    cd ${REPO}/wwwroot
    subdomains=$(ls)
    cd ..
    for subdomain in ${subdomains}; do
      sh ./scripts/release.sh $subdomain
    done

