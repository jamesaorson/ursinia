<h1><a id="emphasis-and-italics" href="#emphasis-and-italics" class="list-item-internal-link">Emphasis And Italics</a></h1><p>This has <em>italic via asterisk</em> and <em>italic via underscore</em>.</p><p>This has <strong>strong via double asterisk</strong> and <strong>strong via double underscore</strong>.</p><p>Combined in one sentence: <em>italics</em> then <strong>strong</strong> then <em>italics</em> then <strong>strong</strong>.</p>
